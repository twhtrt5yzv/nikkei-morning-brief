<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本日の提案資料 | 日経モーニングブリーフ</title>
<style>
  :root {
    --ink: #1a2433;
    --sub: #6b7686;
    --accent: #0b3d91;
    --accent-light: #e8eef9;
    --gold: #b8860b;
    --gold-light: #fdf6e3;
    --alert: #c0392b;
    --alert-light: #fdecec;
    --line: #dfe5ec;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: #eef1f5;
    color: var(--ink);
    line-height: 1.5;
    padding: 12px;
  }
  .topbar {
    max-width: 880px;
    margin: 0 auto 12px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .topbar button {
    padding: 9px 16px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fff;
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .topbar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .topbar .spacer { flex: 1; }
  .status { max-width: 880px; margin: 30px auto; text-align: center; color: var(--sub); font-size: 14px; }

  /* ===== 1枚もの本体 ===== */
  .sheet {
    max-width: 880px;
    margin: 0 auto;
    background: #fff;
    border-radius: 14px;
    padding: 30px 34px;
    box-shadow: 0 3px 16px rgba(15,30,60,.10);
  }
  .sheet-date { color: var(--sub); font-size: 12px; text-align: right; }
  .sheet-title {
    font-size: 26px;
    color: var(--accent);
    line-height: 1.3;
    margin: 2px 0 14px;
    padding-bottom: 10px;
    border-bottom: 3px solid var(--accent);
    letter-spacing: .01em;
  }
  .sheet h3 {
    font-size: 15.5px;
    color: #fff;
    background: var(--accent);
    border-radius: 7px;
    margin: 20px 0 10px;
    padding: 6px 13px;
    letter-spacing: .03em;
  }

  /* 数字バン（KPI） */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 4px 0 12px;
  }
  .kpi {
    border: 2px solid var(--accent-light);
    border-radius: 12px;
    padding: 12px 8px 10px;
    text-align: center;
    background: #fafcff;
  }
  .kpi-num {
    display: block;
    font-size: 31px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1.15;
    letter-spacing: -.01em;
  }
  .kpi-label {
    display: block;
    font-size: 12.5px;
    font-weight: 700;
    margin-top: 3px;
  }
  .kpi-sub { display: block; font-size: 10.5px; color: var(--alert); font-weight: 700; margin-top: 1px; }

  .hook {
    background: var(--accent-light);
    border-left: 5px solid var(--accent);
    border-radius: 8px;
    padding: 12px 15px;
    font-size: 15px;
    font-weight: 600;
  }

  .problem-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .box {
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 13px 12px;
    font-size: 12px;
    background: #fafbfd;
    text-align: center;
    color: var(--sub);
  }
  .box-title {
    display: block;
    font-weight: 800;
    font-size: 15px;
    color: var(--alert);
    margin-bottom: 5px;
    line-height: 1.3;
  }

  /* 主軸×補完（横並び図解） */
  .plan-duo {
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    gap: 12px;
    align-items: stretch;
  }
  .plan-main, .plan-sub {
    border-radius: 13px;
    padding: 16px;
    font-size: 13px;
  }
  .plan-main {
    background: var(--accent-light);
    border: 3px solid var(--accent);
  }
  .plan-sub {
    background: var(--gold-light);
    border: 2px dashed var(--gold);
  }
  .plan-label {
    display: inline-block;
    font-size: 12px;
    font-weight: 800;
    color: #fff;
    border-radius: 6px;
    padding: 3px 12px;
    margin-bottom: 7px;
  }
  .plan-main .plan-label { background: var(--accent); }
  .plan-sub .plan-label { background: var(--gold); }
  .plan-main strong, .plan-sub strong {
    display: block;
    font-size: 16.5px;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .plan-main strong { color: var(--accent); }
  .plan-sub strong { color: var(--gold); }
  .plan-main p, .plan-sub p { font-size: 12.5px; }

  .points {
    margin-top: 12px;
    border: 1.5px dashed var(--accent);
    border-radius: 10px;
    padding: 12px 15px;
    font-size: 13px;
  }
  .points ul { padding-left: 20px; margin-top: 5px; }
  .points li { margin: 4px 0; }

  /* 反論封じQ&A */
  .qa { margin-top: 12px; border: 1.5px solid var(--line); border-radius: 12px; overflow: hidden; }
  .qa-item { padding: 10px 15px; border-bottom: 1px solid var(--line); font-size: 12.5px; }
  .qa-item:last-child { border-bottom: none; }
  .qa-item:nth-child(odd) { background: #fafbfd; }
  .q { font-weight: 700; color: var(--ink); }
  .q::before { content: "Q．"; color: var(--alert); font-weight: 800; }
  .a { display: block; margin-top: 2px; color: var(--ink); }
  .a::before { content: "→ "; color: var(--accent); font-weight: 800; }

  .cta {
    margin-top: 15px;
    background: var(--accent);
    color: #fff;
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 14.5px;
    font-weight: 700;
    text-align: center;
  }

  /* 因果フロー */
  .flow { margin: 6px 0; }
  .flow-step {
    border: 1.5px solid var(--line);
    border-radius: 11px;
    padding: 11px 15px;
    font-size: 13.5px;
    background: #fafbfd;
  }
  .flow-step strong { color: var(--accent); }
  .flow-step.highlight {
    background: var(--alert-light);
    border: 2.5px solid var(--alert);
    font-weight: 600;
  }
  .flow-step.highlight strong { color: var(--alert); }
  .flow-arrow {
    text-align: center;
    color: var(--accent);
    font-size: 16px;
    line-height: 1.3;
    font-weight: 800;
  }
  .note { margin-top: 13px; color: var(--sub); font-size: 12.5px; text-align: center; }

  @media (max-width: 640px) {
    .sheet { padding: 20px 16px; }
    .sheet-title { font-size: 20px; }
    .kpi-num { font-size: 25px; }
    .problem-grid { grid-template-columns: 1fr; }
    .box { text-align: left; }
    .box-title { font-size: 14px; }
    .plan-duo { grid-template-columns: 1fr; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    .topbar { display: none; }
    .sheet { box-shadow: none; border-radius: 0; max-width: none; }
  }
</style>
</head>
<body>
<div class="topbar">
  <button id="btnPres">🎯 提案プレゼン</button>
  <button id="btnMech">⚙️ メカニズム図解</button>
  <span class="spacer"></span>
  <button onclick="window.print()">🖨 印刷 / PDF</button>
</div>
<div id="content" class="status">読み込み中…</div>

<script>
"use strict";
let data = null;

function show(doc) {
  const el = document.getElementById("content");
  const html = doc === "mechanism" ? data.mechanism : data.presentation;
  if (!html) {
    el.className = "status";
    el.textContent = "この資料はまだ生成されていません";
    return;
  }
  el.className = "";
  el.innerHTML = html;
  document.getElementById("btnPres").classList.toggle("active", doc !== "mechanism");
  document.getElementById("btnMech").classList.toggle("active", doc === "mechanism");
  history.replaceState(null, "", "?doc=" + (doc === "mechanism" ? "mechanism" : "presentation"));
}

document.getElementById("btnPres").addEventListener("click", () => show("presentation"));
document.getElementById("btnMech").addEventListener("click", () => show("mechanism"));

(async () => {
  try {
    const res = await fetch("shiryo.json?t=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    data = await res.json();
    const doc = new URLSearchParams(location.search).get("doc") || "presentation";
    show(doc);
  } catch (e) {
    document.getElementById("content").textContent =
      "資料を読み込めませんでした（" + e.message + "）。毎朝の自動生成後に利用できます。";
  }
})();
</script>
</body>
</html>
