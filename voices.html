<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声の聴き比べ | 日経モーニングブリーフ</title>
<style>
  body { font-family: "Hiragino Sans","Yu Gothic",Meiryo,sans-serif; background:#eef1f5; color:#1a2433; margin:0; padding:16px; line-height:1.6; }
  .wrap { max-width:600px; margin:0 auto; }
  h1 { font-size:19px; color:#0b3d91; }
  p.note { font-size:13px; color:#6b7686; }
  .card { background:#fff; border:1px solid #dfe5ec; border-radius:12px; padding:14px 16px; margin:10px 0; }
  .card h2 { font-size:16px; margin:0 0 4px; color:#0b3d91; }
  .card .tag { font-size:12px; color:#6b7686; margin-bottom:8px; }
  audio { width:100%; }
  .rec { border:2px solid #0b3d91; }
  .rec h2::after { content:" ← 現在の声"; font-size:11px; color:#6b7686; font-weight:normal; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎧 音声の聴き比べ</h1>
  <p class="note">同じ文章を各音声で読み上げています。気に入った声の名前を教えてください。毎朝の音声に設定します。</p>

  <div class="card"><h2>Kyoko（女性）</h2><div class="tag">標準・落ち着いた女性の声</div><audio controls preload="none" src="voices/sample_Kyoko.m4a"></audio></div>
  <div class="card rec"><h2>O-ren（女性）</h2><div class="tag">標準・やや明るい女性の声</div><audio controls preload="none" src="voices/sample_O-ren.m4a"></audio></div>
  <div class="card"><h2>Sandy（女性）</h2><div class="tag">新しめ・自然めの声</div><audio controls preload="none" src="voices/sample_Sandy.m4a"></audio></div>
  <div class="card"><h2>Otoya（男性）</h2><div class="tag">標準・落ち着いた男性の声</div><audio controls preload="none" src="voices/sample_Otoya.m4a"></audio></div>
  <div class="card"><h2>Hattori（男性）</h2><div class="tag">標準・ニュース向きの男性の声</div><audio controls preload="none" src="voices/sample_Hattori.m4a"></audio></div>
  <div class="card"><h2>Reed（男性）</h2><div class="tag">新しめ・やわらかい声</div><audio controls preload="none" src="voices/sample_Reed.m4a"></audio></div>

  <p class="note">※ どれも物足りなければ、Macに「高品質音声」を追加ダウンロードすると、ぐっと人間に近い声にできます（担当に相談を）。</p>
</div>
</body>
</html>
